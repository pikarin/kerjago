name: kerjago

services:
    app:
        build:
            context: .
            target: local
        ports:
            - '8000:8000'
            - '5173:5173' # Vite dev server (make dev)
        environment:
            SERVER_NAME: ':8000'
            XDEBUG_MODE: '${XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: 'client_host=host.docker.internal'
        volumes:
            - .:/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started
            typesense:
                condition: service_started
        networks:
            - kerjago

    # No host port mapping on purpose: most macOS setups (Herd, Homebrew)
    # already run Redis on 6379. Host-based devs use their local Redis;
    # containers reach this one as `redis`.
    redis:
        image: redis:7-alpine
        volumes:
            - redis-data:/data
        networks:
            - kerjago

    typesense:
        image: typesense/typesense:26.0
        command: '--data-dir /data --api-key=local --enable-cors'
        ports:
            - '8108:8108'
        volumes:
            - typesense-data:/data
        networks:
            - kerjago

    # No host port mapping on purpose: avoids clashing with local Postgres
    # installs (DBngin, Homebrew, etc.). Reachable as `postgres` inside the
    # Docker network only.
    postgres:
        image: postgres:17-alpine
        environment:
            POSTGRES_USER: root
            POSTGRES_PASSWORD: secret
            POSTGRES_DB: kerjago
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U root -d kerjago']
            interval: 5s
            timeout: 3s
            retries: 10
        networks:
            - kerjago

networks:
    kerjago:
        driver: bridge

volumes:
    postgres-data:
    redis-data:
    typesense-data:
